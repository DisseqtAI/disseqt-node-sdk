name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@disseqt-ai/sdk
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      # NOTE: --provenance is omitted because this repository is private.
      # npm's sigstore attestation requires a public source repo so third
      # parties can verify the build. Re-add the flag (and restore the
      # `id-token: write` permission above) if/when the repo is flipped
      # to public.
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
